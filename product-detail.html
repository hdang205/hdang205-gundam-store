<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chi tiết sản phẩm</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <script>
      // Restore theme immediately to avoid flashing
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        document.body.classList.add("light-mode");
      }
    </script>
  </head>

  <body>
    <div id="particles"></div>

    <header id="header">
      <a href="index.html" class="logo">⚡ GUNDAM STORE</a>

      <div class="header-actions">
        <a href="products.html" aria-label="Quay lại danh sách sản phẩm">
          <i class="fas fa-arrow-left"></i>
        </a>

        <a href="cart.html" aria-label="Xem giỏ hàng">
          <i class="fas fa-shopping-cart"></i>
        </a>

        <button id="themeToggle" aria-label="Đổi giao diện">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <section class="detail-page-shell">
      <div class="detail-page-topbar">
        <a href="products.html" class="btn-secondary detail-back-btn">
          <i class="fas fa-arrow-left"></i>
          Quay lại danh sách
        </a>
      </div>

      <div class="product-detail"></div>
    </section>

    <div id="toast"></div>

    <script src="js/include-header.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
