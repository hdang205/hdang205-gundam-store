<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Grade (MG) - Gundam Store</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script>
      // Restore theme immediately to avoid flashing
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        document.body.classList.add("light-mode");
      }
    </script>
  </head>
  <body data-category="MG">
    <div id="particles"></div>

    <header id="header">
      <a href="index.html" class="logo"><span>⚡ GUNDAM STORE</span></a>
      <div class="header-actions">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Tìm dòng MG..." />
          <i class="fas fa-search"></i>
        </div>
        <div class="user-dropdown">
          <div class="user-icon"><i class="fas fa-user"></i></div>
          <div class="dropdown-menu">
            <a href="login.html"
              ><i class="fas fa-right-to-bracket"></i> Đăng nhập</a
            >
            <a href="register.html"><i class="fas fa-user-plus"></i> Đăng ký</a>
            <a href="user.html"><i class="fas fa-id-card"></i> Hồ sơ</a>
          </div>
        </div>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
        <button id="themeToggle"><i class="fas fa-moon"></i></button>
      </div>
      <button
        id="menuToggle"
        onclick="
          this.classList.toggle('active');
          menu.hidden ^= 1;
        "
      >
        <span></span><span></span><span></span>
      </button>
      <aside id="menu" hidden>
        <nav id="menu-links">
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="products.html">Sản phẩm</a></li>
          <li><a href="mg.html">MG</a></li>
          <li><a href="hg.html">HG</a></li>
          <li><a href="rg-pg.html">RG & PG</a></li>
          <li><a href="phu-kien.html">Phụ kiện</a></li>
          <li><a href="tin-tuc.html">Tin tức</a></li>
          <li><a href="lien-he.html">Liên hệ</a></li>
        </nav>
      </aside>
    </header>

    <main
      style="padding: 120px 20px 40px 20px; max-width: 1200px; margin: 0 auto"
    >
      <h2 class="section-title">MASTER GRADE (MG)</h2>
      <p class="section-subtitle">
        Tỷ lệ 1/100 - Mô hình độ chi tiết cao, sở hữu khung xương cơ động hoàn
        hảo.
      </p>

      <div class="product-grid" id="productGrid"></div>
    </main>

    <footer>
      <p style="text-align: center; color: var(--muted)">
        © <span id="footerYear"></span> Gundam Store
      </p>
    </footer>

    <div class="modal" id="quickModal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>
    <div id="toast"></div>

    <script src="js/include-header.js"></script>
    <script src="js/script.js"></script>
    <script>
      // Đợi danh sách sản phẩm từ script.js tải xong rồi lọc riêng dòng MG (khôi phục)
      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          const grid = document.getElementById("productGrid");
          if (typeof products !== "undefined") {
            const mgProducts = products.filter(
              (p) =>
                (p.category && String(p.category).toUpperCase() === "MG") ||
                String(p.name || "")
                  .toUpperCase()
                  .includes("MG "),
            );
            if (mgProducts.length > 0 && typeof renderProducts === "function") {
              renderProducts(mgProducts);
            }
          }
        }, 100);
      });
    </script>
  </body>
</html>
